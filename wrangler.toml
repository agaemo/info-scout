name = "info-scout"
main = "src/index.ts"
compatibility_date = "2025-04-30"
compatibility_flags = ["nodejs_compat"]

[triggers]
# 0:00 JST: RSS取得・AI要約・D1保存
# 0:30 JST: D1から未送信レコードをSlack通知
crons = ["15 23 * * *", "30 23 * * *"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
# database_name と database_id は Cloudflare ダッシュボード → D1 で確認できる値に変更する
database_name = "info-scout-db"
database_id = "889e5ece-ae06-4f54-8544-03d7b1da9886"
